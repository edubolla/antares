<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Galeria | Antares Construtora</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: "Inter", "Segoe UI", system-ui, sans-serif;
        color: #0b1f33;
        background: #fff;
      }

      .gallery-section__title {
        max-width: 80rem;
        margin: 0 auto;
        padding: 2.5rem 1.25rem;
        text-align: center;
        font-size: 1.75rem;
        font-weight: 600;
        letter-spacing: -0.04em;
      }

      .gallery-grid {
        display: grid;
        gap: 0;
      }

      .gallery-grid--main {
        grid-template-columns: repeat(1, minmax(0, 1fr));
      }

      .gallery-grid--portfolio {
        grid-template-columns: repeat(1, minmax(0, 1fr));
        gap: 0.75rem;
        max-width: 72rem;
        margin-inline: auto;
        padding-inline: 1.25rem;
      }

      .gallery-item img {
        width: 100%;
        height: 284px;
        object-fit: cover;
        display: block;
      }

      .gallery-item--square {
        aspect-ratio: 1 / 1;
        overflow: hidden;
      }

      .gallery-grid--portfolio .gallery-item img {
        height: 100%;
      }

      @media (min-width: 481px) {
        .gallery-grid--main {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }
      }

      @media (min-width: 640px) {
        .gallery-grid--portfolio {
          grid-template-columns: repeat(3, minmax(0, 1fr));
          gap: 1rem;
        }
      }

      @media (min-width: 769px) {
        .gallery-grid--main {
          grid-template-columns: repeat(4, minmax(0, 1fr));
        }

        .gallery-grid--portfolio {
          gap: 1.25rem;
        }
      }
    </style>
  </head>
  <body>
    <section>
      <h2 class="gallery-section__title">Galeria de obras</h2>
      <div class="gallery-grid gallery-grid--main">
        <div class="gallery-item"><img src="image/galeria-antares/01-fachada-externa.jpg" alt="Fachada externa de residência construída pela Antares" width="400" height="284" /></div>
        <div class="gallery-item"><img src="image/galeria-antares/02-fachada-piscina.jpg" alt="Fachada com área externa e piscina" width="400" height="284" /></div>
        <div class="gallery-item"><img src="image/galeria-antares/03-sala-escada.jpg" alt="Sala de estar com escada interna" width="400" height="284" /></div>
        <div class="gallery-item"><img src="image/galeria-antares/04-escada-vidro.jpg" alt="Escada com guarda-corpo em vidro" width="400" height="284" /></div>
        <div class="gallery-item"><img src="image/galeria-antares/05-cozinha.jpg" alt="Cozinha integrada com acabamento premium" width="400" height="284" /></div>
        <div class="gallery-item"><img src="image/galeria-antares/06-area-externa.jpg" alt="Área externa e fachada lateral da residência" width="400" height="284" /></div>
        <div class="gallery-item"><img src="image/galeria-antares/07-closet.jpg" alt="Closet planejado em residência Antares" width="400" height="284" /></div>
        <div class="gallery-item"><img src="image/galeria-antares/08-banheiro.jpg" alt="Banheiro com acabamento moderno" width="400" height="284" /></div>
        <div class="gallery-item"><img src="image/galeria-antares/09-render-fachada.png" alt="Render de fachada residencial Antares" width="400" height="284" /></div>
        <div class="gallery-item"><img src="image/galeria-antares/10-obra-fachada.jpg" alt="Obra em andamento — fachada" width="400" height="284" /></div>
        <div class="gallery-item"><img src="image/galeria-antares/11-obra-interior.jpg" alt="Obra em andamento — ambiente interno" width="400" height="284" /></div>
        <div class="gallery-item"><img src="image/galeria-antares/12-obra-janelas.jpg" alt="Obra em andamento — esquadrias e janelas" width="400" height="284" /></div>
      </div>
    </section>

    <section>
      <h2 class="gallery-section__title">Projetos</h2>
      <div class="gallery-grid gallery-grid--portfolio">
        <div class="gallery-item gallery-item--square"><img src="image/galeria-antares/14-projeto-sala.jpg" alt="Projeto residencial — sala de estar" width="480" height="480" /></div>
        <div class="gallery-item gallery-item--square"><img src="image/galeria-antares/15-projeto-cozinha.jpg" alt="Projeto residencial — cozinha" width="480" height="480" /></div>
        <div class="gallery-item gallery-item--square"><img src="image/galeria-antares/16-projeto-externo.jpg" alt="Projeto residencial — área externa" width="480" height="480" /></div>
      </div>
    </section>
  </body>
</html>
